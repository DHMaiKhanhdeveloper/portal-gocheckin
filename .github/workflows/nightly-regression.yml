name: Nightly Regression

on:
  schedule:
    - cron: '0 9 * * *' # 09:00 UTC (≈ 01:00 US/Pacific) nightly
  workflow_dispatch:

jobs:
  regression:
    name: regression on stage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ENV: stage
      BASE_URL: ${{ secrets.BASE_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      CASHIER_USER: ${{ secrets.CASHIER_USER }}
      CASHIER_PASS: ${{ secrets.CASHIER_PASS }}
      ADMIN_USER: ${{ secrets.ADMIN_USER }}
      ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
      PLAYWRIGHT_RUN_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run regression suite
        run: npx playwright test --grep @regression

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-nightly
          path: reports/allure-results
          retention-days: 30

      - name: Upload traces & videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces-nightly
          path: test-results
          retention-days: 30
