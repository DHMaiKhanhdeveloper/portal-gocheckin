name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'stage'
        type: choice
        options: [local, stage, prod]
      suite:
        description: 'Suite to run'
        required: true
        default: 'smoke'
        type: choice
        options: [smoke, e2e, api, all]

concurrency:
  group: e2e-${{ github.ref }}-${{ github.event.inputs.environment || 'stage' }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ github.event.inputs.suite || 'smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ENV: ${{ github.event.inputs.environment || 'stage' }}
      BASE_URL: ${{ secrets.BASE_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      CASHIER_USER: ${{ secrets.CASHIER_USER }}
      CASHIER_PASS: ${{ secrets.CASHIER_PASS }}
      ADMIN_USER: ${{ secrets.ADMIN_USER }}
      ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
      PLAYWRIGHT_RUN_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npx playwright test --grep @${{ github.event.inputs.suite || 'smoke' }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: reports/html
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results
          retention-days: 14

      - name: Upload traces & videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces
          path: test-results
          retention-days: 14
